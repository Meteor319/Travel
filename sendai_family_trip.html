*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.hero{background:linear-gradient(135deg,#1a3a5c 0%,#2d6a9f 60%,#1e8c6e 100%);color:#fff;padding:2rem 1.5rem 1.5rem;text-align:center}
.hero-emoji{font-size:48px;margin-bottom:12px}
.hero-title{font-size:26px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.hero-sub{font-size:14px;opacity:0.85;margin-bottom:16px}
.hero-badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.badge{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500}
.container{max-width:640px;margin:0 auto;padding:1.25rem 1rem 3rem}
.nav-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;position:sticky;top:0;background:#f5f4f0;padding:10px 0;z-index:10}
.tab{padding:6px 13px;border-radius:20px;border:1.5px solid #c8c6be;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#555;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.tab.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.tab.red{border-color:#e53935}.tab.red.active{background:#e53935}
.tab.green{border-color:#2e7d32}.tab.green.active{background:#2e7d32}
.page{display:none}.page.active{display:block}
.section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:8px}
.card{background:#fff;border:1px solid #e0ddd6;border-radius:14px;padding:4px 16px;margin-bottom:1.25rem}
.card-pad{background:#fff;border:1px solid #e0ddd6;border-radius:14px;padding:14px 16px;margin-bottom:1.25rem}
/* day header */
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1.5px solid #e0ddd6}
.day-badge{width:52px;height:52px;border-radius:14px;background:#e8f0f8;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.day-title{font-size:18px;font-weight:700;color:#1a1a18;line-height:1.3}
.day-date{font-size:13px;color:#666;margin-top:3px}
/* transport */
.t-step{display:flex;align-items:flex-start;gap:10px;padding:10px 0}
.t-step+.t-step{border-top:1px solid #f0ede8}
.t-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:1px}
.t-metro{background:#e3f0fc}.t-walk{background:#e8f5e9}.t-bus{background:#fff3e0}
.t-taxi{background:#fce4ec}.t-train{background:#ede7f6}.t-shuttle{background:#e0f2f1}
.t-main{font-size:13px;font-weight:600;color:#1a1a18;line-height:1.4}
.t-sub{font-size:12px;color:#888;margin-top:2px;line-height:1.5}
.map-btn{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:4px 10px;background:#e8f4fd;border:1px solid #b3d9f5;border-radius:20px;font-size:11px;font-weight:600;color:#1565c0;text-decoration:none}
/* spots */
.spot-card{background:#fff;border:1.5px solid #e0ddd6;border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .15s;margin-bottom:10px}
.spot-card.open{border-color:#2d6a9f}
.spot-hd{display:flex;align-items:center;gap:10px}
.spot-icon{font-size:24px;line-height:1;flex-shrink:0}
.spot-name{font-size:15px;font-weight:700;color:#1a1a18}
.spot-type{font-size:11px;color:#888;margin-top:2px;font-weight:500}
.chevron{font-size:16px;color:#bbb;margin-left:auto;transition:transform .2s;flex-shrink:0}
.spot-card.open .chevron{transform:rotate(180deg)}
.spot-body{display:none;margin-top:12px;border-top:1px solid #f0ede8;padding-top:12px}
.spot-card.open .spot-body{display:block}
.spot-desc{font-size:13px;color:#444;line-height:1.7;margin-bottom:12px}
.kid-box{background:#f0faf5;border:1px solid #a8dfc4;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.kid-lbl{font-size:11px;font-weight:700;color:#1e8c6e;margin-bottom:6px}
.kid-txt{font-size:13px;color:#1e5c47;line-height:1.65}
.tip-box{background:#fff8ec;border:1px solid #f5c842;border-radius:10px;padding:12px 14px}
.tip-lbl{font-size:11px;font-weight:700;color:#b8860b;margin-bottom:6px}
.tip-txt{font-size:12px;color:#7a5c00;line-height:1.65}

.food-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0}
.food-row+.food-row{border-top:1px solid #f0ede8}
.food-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.food-name{font-size:13px;font-weight:600;color:#1a1a18}
.food-detail{font-size:12px;color:#888;margin-top:2px;line-height:1.5}
/* budget */
.budget-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ede8}
.budget-bar:last-child{border-bottom:none}
.budget-lbl{font-size:13px;color:#555}
.budget-amt{font-size:13px;font-weight:700;color:#1a3a5c}
.budget-total{background:#e8f0f8;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.budget-total-lbl{font-size:13px;font-weight:700;color:#1a3a5c}
.budget-total-amt{font-size:16px;font-weight:700;color:#1a3a5c}

.sos-title{font-size:14px;font-weight:700;color:#c62828;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sos-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.sos-row+.sos-row{border-top:1px solid #ffebee}
.sos-name{font-size:13px;color:#444;flex:1}
.sos-num{font-size:13px;font-weight:700;color:#c62828;text-decoration:none}
.info-card{background:#f0f7ff;border:1px solid #bbdefb;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.info-title{font-size:13px;font-weight:700;color:#1565c0;margin-bottom:8px}
.info-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #e3f2fd}
.info-row:last-child{border-bottom:none}
.info-lbl{color:#555}
.info-val{color:#1a1a18;font-weight:600;text-align:right}

.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.check-item+.check-item{border-top:1px solid #f0ede8}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid #c8c6be;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff}
.check-box.checked{background:#1e8c6e;border-color:#1e8c6e;color:#fff}
.check-lbl{font-size:13px;color:#333;flex:1;line-height:1.4}
.check-lbl.done{text-decoration:line-through;color:#aaa}
.check-cat{font-size:11px;font-weight:700;color:#999;margin:12px 0 4px;letter-spacing:.08em;text-transform:uppercase}
/* weather */
.wx-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.wx-row+.wx-row{border-top:1px solid #f0ede8}
.wx-day{font-size:12px;font-weight:700;color:#555;width:80px;flex-shrink:0}
.wx-icon{font-size:20px;flex-shrink:0}
.wx-tmp{font-size:13px;font-weight:600;color:#1a1a18;flex:1}
.wx-warn{font-size:11px;color:#e65100;margin-top:2px}
.wx-tip{background:#fff8ec;border:1px solid #f5c842;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;color:#7a5c00;line-height:1.6}

.ew{background:#e63c38}

.sta{font-size:11px;background:#f0f0ee;border-radius:6px;padding:3px 8px;color:#333;font-weight:500}
.sta.us{background:#e8f5e9;color:#1b5e20;font-weight:700}
/* footer */
.footer{text-align:center;padding:2rem 1rem;color:#aaa;font-size:12px;border-top:1px solid #e0ddd6;margin-top:1rem}

// ─── 渲染函數 ─────────────────────────────────
function buildDay(d){
  let wx=`<div class="wx-row"><span class="wx-day">${d.date.split('（')[1]?.replace('）','') || ''}</span><span class="wx-icon">${d.weather.icon}</span><div><div class="wx-tmp">${d.weather.tmp}</div><div class="wx-warn">${d.weather.warn}</div></div></div>`;

  let trans='';
  d.transport.forEach(t=>{
    const url="https://www.google.com/maps/dir/?api=1&origin="+t.f.lat+","+t.f.lng+"&destination="+t.t.lat+","+t.t.lng+"&travelmode="+t.mode;
    trans+=`<div class="t-step"><div class="t-icon ${t.ic}">${t.sy}</div><div style="flex:1"><div class="t-main">${t.m}</div><div class="t-sub">${t.s}</div><a class="map-btn" href="${url}" target="_blank">📍 ${t.f.n} → ${t.t.n} ↗</a></div></div>`;
  });

  let spots='';
  d.spots.forEach(s=>{
    const murl=`https://maps.google.com/?q=${s.lat},${s.lng}&z=17`;
    spots+=`<div class="spot-card" onclick="tog(this)">
<div class="spot-hd"><span class="spot-icon">${s.ic}</span><div style="flex:1"><div class="spot-name">${s.n}</div><div class="spot-type">${s.ty}</div></div><span class="chevron">▾</span></div>
<div class="spot-body">
<p class="spot-desc">${s.desc}</p>
<a class="map-btn" href="${murl}" target="_blank" onclick="event.stopPropagation()" style="margin-bottom:10px;display:inline-flex">📍 在 Google Maps 開啟 ↗</a>
<div class="kid-box" style="margin-top:10px"><div class="kid-lbl">👧 怎麼跟 5 歲說</div><div class="kid-txt">「${s.kid}」</div></div>
${s.tip?`<div class="tip-box"><div class="tip-lbl">⚠️ 注意事項</div><div class="tip-txt">${s.tip}</div></div>`:''}
</div></div>`;
  });

  let food='';
  d.food.forEach(f=>{food+=`<div class="food-row"><span class="food-icon">${f.ic}</span><div><div class="food-name">${f.n}</div><div class="food-detail">${f.d}</div></div></div>`;});

  let budget='';
  d.budget.forEach(b=>{budget+=`<div class="budget-bar"><span class="budget-lbl">${b.l}</span><span class="budget-amt">${b.a}</span></div>`;});

  return `<div class="day-header"><div class="day-badge">${d.emoji}</div><div><div class="day-title">${d.title}</div><div class="day-date">${d.date}</div></div></div>
<div class="section-label">今日天氣</div><div class="card">${wx}<div class="wx-tip">🧴 提醒：防曬乳每 2 小時補擦・幼童帽子防曬・電動輪椅控制器避免直曬日光・輪椅電量出發前確認滿電</div></div>
<div class="section-label">交通路線</div><div class="card">${trans}</div>
<div class="section-label">景點介紹（點開查看）</div>${spots}
<div class="section-label">今日餐廳・美食・甜點</div><div class="card">${food}</div>
<div class="section-label">今日預算參考（每人）</div><div class="card-pad">${budget}<div class="budget-total"><span class="budget-total-lbl">每人概估</span><span class="budget-total-amt">${d.perPerson}</span></div></div>`;
}

function buildChecklist(){
  let html='';
  for(const[cat,items] of Object.entries(CHECKLIST)){
    html+=`<div class="check-cat">${cat}</div><div class="card">`;
    items.forEach((item,i)=>{
      const key='chk_'+cat+'_'+i;
      const checked=localStorage.getItem(key)==='1';
      html+=`<div class="check-item" onclick="toggleCheck(this,'${key}')">
<div class="check-box${checked?' checked':''}">${checked?'✓':''}</div>
<span class="check-lbl${checked?' done':''}">${item}</span></div>`;
    });
    html+='</div>';
  }
  return html;
}

function toggleCheck(el,key){
  const box=el.querySelector('.check-box');
  const lbl=el.querySelector('.check-lbl');
  const checked=box.classList.toggle('checked');
  box.textContent=checked?'✓':'';
  lbl.classList.toggle('done',checked);
  localStorage.setItem(key,checked?'1':'0');
}

});

html+=`<div class="page" id="sos">${SOS_HTML}</div>`;

function show(id,tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  tab.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function tog(el){el.classList.toggle('open')}
</script>
