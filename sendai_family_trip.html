function makeMapUrl(from, to, mode){
  const m = mode==="transit"?"transit": mode==="walking"?"walking":"driving";
  return "https://www.google.com/maps/dir/?api=1"
    +"&origin="+from.lat+","+from.lng
    +"&destination="+to.lat+","+to.lng
    +"&travelmode="+m;
}

function buildPanel(d,i){
  let transport='';
  d.transport.forEach(t=>{
    const url = makeMapUrl(t.from, t.to, t.mode);
    transport+=`<div class="transport-step">
<div class="t-icon ${t.icon}">${t.sym}</div>
<div class="t-text">
  <div class="t-main">${t.main}</div>
  <div class="t-sub">${t.sub}</div>
  <a class="map-btn" href="${url}" target="_blank" rel="noopener">
    <span>📍</span> ${t.from.name} → ${t.to.name} <span class="map-arrow">↗</span>
  </a>
</div>
</div>`;
  });

  let spots='';
  d.spots.forEach(s=>{
    spots+=`<div class="spot-card" onclick="toggleSpot(this)">
<div class="spot-header">
  <span class="spot-icon">${s.icon}</span>
  <div style="flex:1"><div class="spot-name">${s.name}</div><div class="spot-type">${s.type}</div></div>
  <span class="chevron">▾</span>
</div>
<div class="spot-body">
  <p class="spot-desc">${s.desc}</p>
  <a class="map-btn" href="${s.mapurl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="margin-bottom:10px;display:inline-flex">
    📍 在 Google Maps 開啟 <span class="map-arrow">↗</span>
  </a>
  <div class="kid-box" style="margin-top:10px">
    <div class="kid-label">👧 怎麼跟 5 歲小朋友說</div>
    <div class="kid-text">「${s.kid}」</div>
  </div>
  ${s.tip?`<div class="tip-box"><div class="tip-label">⚠️ 注意事項</div><div class="tip-text">${s.tip}</div></div>`:''}
</div>
</div>`;
  });

  let food='';
  d.food.forEach(f=>{
    food+=`<div class="food-row">
<span class="food-icon">${f.icon}</span>
<div><div class="food-name">${f.name}</div><div class="food-detail">${f.detail}</div></div>
</div>`;
  });

  return `<div class="day-panel${i===0?' active':''}" id="panel-${i}">
<div class="day-header">
  <div class="day-badge">${d.emoji}</div>
  <div><div class="day-title">${d.title}</div><div class="day-date">${d.date}</div></div>
</div>
<div class="section-label">交通路線</div>
<div class="transport-card">${transport}</div>
<div class="section-label">景點介紹（點開查看地圖與小朋友說法）</div>
<div class="spots">${spots}</div>
<div class="section-label">餐廳・美食・甜點</div>
<div class="food-card-wrap" style="margin-bottom:1rem">${food}</div>
</div>`;
}

document.getElementById('panels').innerHTML=days.map((d,i)=>buildPanel(d,i)).join('');

function switchDay(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.day-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleSpot(el){
  el.classList.toggle('open');
}
</script>
